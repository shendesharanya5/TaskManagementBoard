# ===============================
# Application
# ===============================
spring.application.name=task-management-board
server.port=8080

# ===============================
# MySQL Datasource
# Update username/password/db name to match your local MySQL Workbench setup
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/task_management_board?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ===============================
# Jackson
# ===============================
spring.jackson.serialization.write-dates-as-timestamps=false

# ===============================
# Pagination defaults (v3+)
# ===============================
spring.data.web.pageable.default-page-size=10
spring.data.web.pageable.max-page-size=100
